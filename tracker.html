<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CZ Tracker">
<meta name="theme-color" content="#070e1a">
<title>CartZero Tracker</title>
<link rel="manifest" href="/manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#070e1a;--bg2:#0d1829;--bg3:#141f33;
  --border:#1e2d47;--border2:#243550;
  --text:#e8edf5;--text2:#8899b4;--text3:#4a5a73;
  --orange:#ff6b2b;--orange2:#e85a1e;
  --green:#1D9E75;--blue:#378ADD;--red:#E24B4A;--amber:#EF9F27;
  --purple:#7F77DD;--coral:#D85A30;--pink:#D4537E;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;font-size:15px;height:100%;overflow:hidden}
.page-wrap{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* Header */
.hdr{
  background:var(--bg);
  padding:calc(var(--safe-top) + 14px) 16px 0;
  border-bottom:0.5px solid var(--border);
  flex-shrink:0;
  z-index:100;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr-logo{font-size:16px;font-weight:700;letter-spacing:-0.02em}
.hdr-logo span{color:var(--orange)}
.hdr-meta{font-size:11px;color:var(--text3)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat{background:var(--bg2);border-radius:8px;padding:8px 10px;text-align:center}
.stat-n{font-size:18px;font-weight:600;color:var(--text)}
.stat-l{font-size:10px;color:var(--text3);margin-top:1px}
.stat.hi .stat-n{color:var(--orange)}

/* Search */
.search-wrap{margin-bottom:10px;position:relative}
.search-wrap input{
  width:100%;background:var(--bg2);border:0.5px solid var(--border);
  border-radius:10px;padding:9px 12px 9px 36px;
  color:var(--text);font-size:14px;outline:none;
}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--border2)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:0;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:10px}
.tab{flex:1;padding:7px 4px;font-size:12px;font-weight:500;border:none;background:none;color:var(--text2);border-radius:8px;transition:all .15s}
.tab.on{background:var(--bg3);color:var(--text);border:0.5px solid var(--border)}

/* Main content */
.content{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:0 16px calc(var(--safe-bot) + 20px);
  -webkit-overflow-scrolling:touch;
}

/* Section header */
.sec{display:flex;align-items:center;gap:7px;padding:14px 0 8px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em}
.sec-dot{width:6px;height:6px;border-radius:50%}

/* Ticket card */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.card:active{background:var(--bg3)}
.card.hi{border-left:2.5px solid var(--green)}
.card.urgent{border-left:2.5px solid var(--red)}
.card-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4}
.card-row{display:flex;align-items:center;gap:7px;margin-top:6px;flex-wrap:wrap}
.pill{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500}
.card-date{font-size:10px;color:var(--text3)}
.card-note{
  font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;
  border-top:0.5px solid var(--border);line-height:1.55;
  display:none;
}
.card.open .card-note{display:block}
.card-chevron{margin-left:auto;font-size:12px;color:var(--text3);transition:transform .2s}
.card.open .card-chevron{transform:rotate(180deg)}

/* Timeline */
.tl{padding:4px 0}
.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-left{display:flex;flex-direction:column;align-items:center;min-width:52px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:3px}
.tl-dot.u{background:var(--red)}
.tl-dot.soon{background:var(--amber)}
.tl-date-str{font-size:10px;color:var(--text3);margin-top:4px;text-align:center;line-height:1.3}
.tl-label{font-size:13px;color:var(--text);line-height:1.4;padding-top:2px}
.tl-days{font-size:11px;color:var(--text3);margin-top:4px}

/* All view groups */
.group{margin-bottom:4px}
.group-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px;cursor:pointer;border-bottom:0.5px solid var(--border);margin-bottom:0}
.group-hdr-left{display:flex;align-items:center;gap:8px}
.group-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.group-count{font-size:11px;color:var(--text3);background:var(--bg2);padding:2px 8px;border-radius:10px}
.group-body{margin-top:7px}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

/* Password gate */
#gate{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;
}
.gate-logo{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px}
.gate-logo span{color:var(--orange)}
.gate-sub{font-size:13px;color:var(--text3);margin-bottom:32px}
.gate-input{
  width:100%;max-width:280px;background:var(--bg2);
  border:0.5px solid var(--border2);border-radius:12px;
  padding:14px 16px;color:var(--text);font-size:16px;
  text-align:center;letter-spacing:0.08em;outline:none;
  -webkit-appearance:none;
}
.gate-input:focus{border-color:var(--orange)}
.gate-btn{
  margin-top:12px;width:100%;max-width:280px;
  background:var(--orange);color:#fff;border:none;
  border-radius:12px;padding:14px;font-size:15px;font-weight:600;
  cursor:pointer;
}
.gate-btn:active{background:var(--orange2)}
.gate-err{
  font-size:12px;color:var(--red);margin-top:10px;
  opacity:0;transition:opacity .2s;
}
.gate-err.show{opacity:1}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .3s ease}
</style>
</head>
<body>
<div id="gate">
  <div class="gate-logo">CART<span>ZERO.</span></div>
<div class="page-wrap">
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">CART<span>ZERO.</span> tracker</div>
    <div class="hdr-meta" id="meta-date">110 tickets</div>
  </div>
  <div class="stats-row">
    <div class="stat hi"><div class="stat-n" id="s-todo">32</div><div class="stat-l">to do</div></div>
    <div class="stat"><div class="stat-n" id="s-wait">14</div><div class="stat-l">watching</div></div>
    <div class="stat"><div class="stat-n" id="s-done">55</div><div class="stat-l">done</div></div>
    <div class="stat"><div class="stat-n" id="s-park">9</div><div class="stat-l">parked</div></div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input id="search" type="search" placeholder="Suchen..." autocomplete="off" oninput="onSearch()">
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchView('focus')">Focus</button>
    <button class="tab" onclick="switchView('timeline')">Timeline</button>
    <button class="tab" onclick="switchView('all')">Alle</button>
  </div>
</div>

<div class="content">
  <div id="view-focus"></div>
  <div id="view-timeline" style="display:none"></div>
  <div id="view-all" style="display:none"></div>
  <div id="view-search" style="display:none"></div>
</div>
</div><!-- page-wrap -->
<script>

const DL=[
  {"d":"2026-05-28","label":"FOIL NYC Parks \u2014 Antwort f\u00e4llig","u":true},
  {"d":"2026-06-05","label":"YC S2026 \u2014 Interview Decision","u":true},
  {"d":"2026-07-20","label":"cartzero.app \u2014 Porkbun registrieren","u":false},
  {"d":"2026-09-22","label":"Climate Week NYC \u2014 Nest Campus Javits","u":false},
  {"d":"2026-09-23","label":"Ceres Invite-Only \u2014 Convene 75 Rockefeller","u":false},
  {"d":"2026-11-10","label":"USPTO Paris Convention (6 Mo ab DPMA)","u":false},
  {"d":"2026-12-31","label":"BCS Permits Central Park \u2014 Renewal Leverage","u":false}
];
var DATA=[];
var CC={yc:'#378ADD',out:'#1D9E75',pro:'#7F77DD',ops:'#8899b4',res:'#EF9F27',cli:'#D85A30',fun:'#639922',ppl:'#D4537E',leg:'#E24B4A',hub:'#1D9E75',str:'#7F77DD'};
var CL={yc:'YC',out:'outreach',pro:'product',ops:'ops',res:'research',cli:'climate',fun:'funding',ppl:'people',leg:'legal',hub:'hub',str:'strategy'};
var currentView='focus';

function pill(c){
  var col=CC[c]||'#8899b4';
  var lbl=CL[c]||c;
  return '<span class="pill" style="background:'+col+'22;color:'+col+'">'+lbl+'</span>';
}

function card(t,ac){
  ac=ac||'';
  var note=t.n?'<div class="card-note">'+t.n.replace(/\n/g,'<br>')+'</div>':'';
  var chev=t.n?'<span class="card-chevron">&#8964;</span>':'';
  var ds=t.d?'<span class="card-date">'+t.d+'</span>':'';
  return '<div class="card '+ac+'" onclick="toggleCard(this)">'+
    '<div class="card-title">'+t.t+'</div>'+
    '<div class="card-row">'+pill(t.c)+ds+chev+'</div>'+
    note+'</div>';
}

function toggleCard(el){el.classList.toggle('open');}

function daysFrom(ds){
  var d=new Date(ds);
  var now=new Date('2026-05-17');
  return Math.round((d-now)/86400000);
}

function matches(t,q){
  if(!q)return true;
  var s=(t.t+' '+(t.n||'')+' '+t.c).toLowerCase();
  return q.toLowerCase().split(' ').every(function(w){return s.indexOf(w)>=0;});
}

function renderFocus(filter){
  filter=filter||'';
  var hi=DATA.filter(function(t){return t.col==='todo'&&t.p==='hi'&&matches(t,filter);});
  var wa=DATA.filter(function(t){return t.col==='wait'&&matches(t,filter);});
  var h='';
  if(hi.length){
    h+='<div class="sec"><span class="sec-dot" style="background:#E24B4A"></span>Jetzt handeln ('+hi.length+')</div>';
    hi.forEach(function(t){h+=card(t,'urgent');});
  }
  if(wa.length){
    h+='<div class="sec"><span class="sec-dot" style="background:#EF9F27"></span>Watching ('+wa.length+')</div>';
    wa.forEach(function(t){h+=card(t,'hi');});
  }
  if(!h)h='<div class="empty">Nichts zu zeigen</div>';
  document.getElementById('view-focus').innerHTML=h;
}

function renderTimeline(){
  var h='<div class="tl">';
  DL.forEach(function(dl){
    var days=daysFrom(dl.d);
    var dstr=days<0?'vergangen':days===0?'heute':'in '+days+' Tagen';
    var dc=dl.u?'u':(days<30?'soon':'');
    var parts=dl.d.split('-');
    var dlabel=parts[2]+'.'+parts[1]+'.'+parts[0];
    h+='<div class="tl-item"><div class="tl-left"><div class="tl-dot '+dc+'"></div>'+
      '<div class="tl-date-str">'+dlabel+'</div></div>'+
      '<div><div class="tl-label">'+dl.label+'</div>'+
      '<div class="tl-days">'+dstr+'</div></div></div>';
  });
  h+='</div>';
  document.getElementById('view-timeline').innerHTML=h;
}

function group(title,items,collapsed,ac){
  if(!items.length)return'';
  var id='g'+Math.floor(Math.random()*999999);
  var body=items.map(function(t){return card(t,ac);}).join('');
  var disp=collapsed?'none':'block';
  return '<div class="group">'+
    '<div class="group-hdr" onclick="toggleGroup(\''+id+'\')">'+
    '<div class="group-hdr-left">'+
    '<span class="group-title">'+title+'</span>'+
    '<span class="group-count">'+items.length+'</span></div>'+
    '<span style="color:var(--text3);font-size:12px">&#8964;</span></div>'+
    '<div id="'+id+'" class="group-body" style="display:'+disp+'">'+body+'</div></div>';
}

function toggleGroup(id){
  var el=document.getElementById(id);
  el.style.display=el.style.display==='none'?'block':'none';
}

function renderAll(filter){
  filter=filter||'';
  var th=DATA.filter(function(t){return t.col==='todo'&&t.p==='hi'&&matches(t,filter);});
  var tm=DATA.filter(function(t){return t.col==='todo'&&t.p!=='hi'&&matches(t,filter);});
  var wa=DATA.filter(function(t){return t.col==='wait'&&matches(t,filter);});
  var dn=DATA.filter(function(t){return t.col==='done'&&matches(t,filter);});
  var pk=DATA.filter(function(t){return t.col==='park'&&matches(t,filter);});
  var h=group('To do — high priority',th,false,'urgent')+
        group('Watching',wa,false,'hi')+
        group('To do — weitere',tm,true,'')+
        group('Done',dn,true,'')+
        group('Parked',pk,true,'');
  if(!h)h='<div class="empty">Keine Treffer</div>';
  document.getElementById('view-all').innerHTML=h;
}

function switchView(v){
  currentView=v;
  document.getElementById('search').value='';
  ['focus','timeline','all','search'].forEach(function(n){
    document.getElementById('view-'+n).style.display='none';
  });
  document.getElementById('view-'+v).style.display='block';
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('on',['focus','timeline','all'][i]===v);
  });
  if(v==='timeline')renderTimeline();
  else if(v==='all')renderAll();
  else renderFocus();
}

function onSearch(){
  var q=document.getElementById('search').value.trim();
  if(!q){switchView(currentView==='search'?'focus':currentView);return;}
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  ['focus','timeline','all'].forEach(function(n){
    document.getElementById('view-'+n).style.display='none';
  });
  var results=DATA.filter(function(t){return matches(t,q);});
  var h='';
  if(results.length){
    results.forEach(function(t){
      var ac=t.col==='todo'&&t.p==='hi'?'urgent':t.col==='wait'?'hi':'';
      h+=card(t,ac);
    });
  }else{
    h='<div class="empty">Keine Treffer</div>';
  }
  document.getElementById('view-search').innerHTML=h;
  document.getElementById('view-search').style.display='block';
}

async function init(){
  var vf=document.getElementById('view-focus');
  vf.style.display='block';
  vf.innerHTML='<div class="empty" style="padding:60px 20px">&#8987; Lade...</div>';
  try{
    var res=await fetch('/tracker.json',{cache:'no-cache'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    DATA=await res.json();
    var total=DATA.length;
    var done=DATA.filter(function(t){return t.col==='done';}).length;
    var todo=DATA.filter(function(t){return t.col==='todo';}).length;
    var wait=DATA.filter(function(t){return t.col==='wait';}).length;
    var park=DATA.filter(function(t){return t.col==='park';}).length;
    document.getElementById('s-todo').textContent=todo;
    document.getElementById('s-wait').textContent=wait;
    document.getElementById('s-done').textContent=done;
    document.getElementById('s-park').textContent=park;
    document.getElementById('meta-date').textContent=total+' tickets';
    renderFocus();
  }catch(e){
    document.getElementById('view-focus').innerHTML=
      '<div style="padding:40px 20px;text-align:center">'+
      '<div style="font-size:28px;margin-bottom:12px">&#9888;</div>'+
      '<div style="font-size:14px;color:var(--orange);margin-bottom:8px">tracker.json Fehler</div>'+
      '<div style="font-size:12px;color:var(--text2)">'+e.message+'</div></div>';
  }
}

function isAuthed(){
  var exp=localStorage.getItem('cz_auth');
  if(!exp)return false;
  if(Date.now()>parseInt(exp)){localStorage.removeItem('cz_auth');return false;}
  return true;
}
function lockTracker(){
  localStorage.removeItem('cz_auth');
  location.reload();
}
function checkPw(){
  var val=document.getElementById('pw').value;
  if(val==='20_CartZero_26'){
    localStorage.setItem('cz_auth', Date.now() + 28800000);
    document.getElementById('gate').style.display='none';
    init();
  }else{
    var inp=document.getElementById('pw');
    var err=document.getElementById('gate-err');
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    err.classList.add('show');
    inp.value='';
    setTimeout(function(){err.classList.remove('show');},2000);
  }
}

// Always init on load — gate covers screen until auth
document.addEventListener('DOMContentLoaded', function(){
  if(isAuthed()){
    var g=document.getElementById('gate');
    if(g)g.style.display='none';
  }
  init();
});

</script>
</body>
</html>
