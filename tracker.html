<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CZ Tracker">
<meta name="theme-color" content="#070e1a">
<title>CartZero Tracker</title>
<link rel="manifest" href="/manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#070e1a;--bg2:#0d1829;--bg3:#141f33;
  --border:#1e2d47;--border2:#243550;
  --text:#e8edf5;--text2:#8899b4;--text3:#4a5a73;
  --orange:#ff6b2b;--orange2:#e85a1e;
  --green:#1D9E75;--blue:#378ADD;--red:#E24B4A;--amber:#EF9F27;
  --purple:#7F77DD;--coral:#D85A30;--pink:#D4537E;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* Header */
.hdr{
  background:var(--bg);
  padding:calc(var(--safe-top) + 14px) 16px 0;
  border-bottom:0.5px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr-logo{font-size:16px;font-weight:700;letter-spacing:-0.02em}
.hdr-logo span{color:var(--orange)}
.hdr-meta{font-size:11px;color:var(--text3)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat{background:var(--bg2);border-radius:8px;padding:8px 10px;text-align:center}
.stat-n{font-size:18px;font-weight:600;color:var(--text)}
.stat-l{font-size:10px;color:var(--text3);margin-top:1px}
.stat.hi .stat-n{color:var(--orange)}

/* Search */
.search-wrap{margin-bottom:10px;position:relative}
.search-wrap input{
  width:100%;background:var(--bg2);border:0.5px solid var(--border);
  border-radius:10px;padding:9px 12px 9px 36px;
  color:var(--text);font-size:14px;outline:none;
}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--border2)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:0;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:10px}
.tab{flex:1;padding:7px 4px;font-size:12px;font-weight:500;border:none;background:none;color:var(--text2);border-radius:8px;transition:all .15s}
.tab.on{background:var(--bg3);color:var(--text);border:0.5px solid var(--border)}

/* Main content */
.content{padding:0 16px calc(var(--safe-bot) + 20px)}

/* Section header */
.sec{display:flex;align-items:center;gap:7px;padding:14px 0 8px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em}
.sec-dot{width:6px;height:6px;border-radius:50%}

/* Ticket card */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.card:active{background:var(--bg3)}
.card.hi{border-left:2.5px solid var(--green)}
.card.urgent{border-left:2.5px solid var(--red)}
.card-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4}
.card-row{display:flex;align-items:center;gap:7px;margin-top:6px;flex-wrap:wrap}
.pill{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500}
.card-date{font-size:10px;color:var(--text3)}
.card-note{
  font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;
  border-top:0.5px solid var(--border);line-height:1.55;
  display:none;
}
.card.open .card-note{display:block}
.card-chevron{margin-left:auto;font-size:12px;color:var(--text3);transition:transform .2s}
.card.open .card-chevron{transform:rotate(180deg)}

/* Timeline */
.tl{padding:4px 0}
.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-left{display:flex;flex-direction:column;align-items:center;min-width:52px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:3px}
.tl-dot.u{background:var(--red)}
.tl-dot.soon{background:var(--amber)}
.tl-date-str{font-size:10px;color:var(--text3);margin-top:4px;text-align:center;line-height:1.3}
.tl-label{font-size:13px;color:var(--text);line-height:1.4;padding-top:2px}
.tl-days{font-size:11px;color:var(--text3);margin-top:4px}

/* All view groups */
.group{margin-bottom:4px}
.group-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px;cursor:pointer;border-bottom:0.5px solid var(--border);margin-bottom:0}
.group-hdr-left{display:flex;align-items:center;gap:8px}
.group-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.group-count{font-size:11px;color:var(--text3);background:var(--bg2);padding:2px 8px;border-radius:10px}
.group-body{margin-top:7px}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">CART<span>ZERO.</span> tracker</div>
    <div class="hdr-meta" id="meta-date">110 tickets</div>
  </div>
  <div class="stats-row">
    <div class="stat hi"><div class="stat-n" id="s-todo">32</div><div class="stat-l">to do</div></div>
    <div class="stat"><div class="stat-n" id="s-wait">14</div><div class="stat-l">watching</div></div>
    <div class="stat"><div class="stat-n" id="s-done">55</div><div class="stat-l">done</div></div>
    <div class="stat"><div class="stat-n" id="s-park">9</div><div class="stat-l">parked</div></div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input id="search" type="search" placeholder="Suchen..." autocomplete="off" oninput="onSearch()">
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchView('focus')">Focus</button>
    <button class="tab" onclick="switchView('timeline')">Timeline</button>
    <button class="tab" onclick="switchView('all')">Alle</button>
  </div>
</div>

<div class="content">
  <div id="view-focus"></div>
  <div id="view-timeline" style="display:none"></div>
  <div id="view-all" style="display:none"></div>
  <div id="view-search" style="display:none"></div>
</div>

 = valider Solo-Pilot unabhängig von BCS."},{"id":"n02","col":"todo","t":"Bronx Zoo MFV Depot — Pilot Hub Kandidat #1 Bronx","c":"hub","p":"hi","d":"","n":"2300 Southern Blvd, Bronx 10460. NYC Parks-betriebenes dediziertes MFV Depot. Carts stehen über Nacht dort. Depot-Commissary-Modell = Battery direkt am Cart tauschen, keine Übergabe-Logistik. Wahrscheinlichster Standort für Big City Snacks (9 Central Park Permits). Kontaktpfad: NYC Parks Concessions → Carina Kaufman-Gutierrez. Tel: 718-741-8173."},{"id":"n03","col":"todo","t":"Sequenz: Bronx Zoo Depot → BCS → Pilot-Konvergenz","c":"str","p":"hi","d":"Post-YC","n":"Bronx Zoo Depot = Knotenpunkt wo drei Fäden zusammenlaufen: (1) NYC Parks als institutioneller Partner, (2) BCS als erster Pilot-Operator, (3) Depot-Commissary als cleanste operationelle Proof-of-Concept Situation. Sobald Carina-Verbindung aktiv: NYC Parks Concessions um Depot-Kontakt bitten. Nicht direkt zu BCS — erst den Hub-Operator kennenlernen."},{"id":"f01","col":"done","t":"Foerdermittel-Matrix CapEx — gescreent","c":"fun","p":"hi","d":"2026-05-01","n":"NEVI DCFC Round 1 — kein Fit. NYSERDA Retail Storage Incentive — direkt auf Commissary Hub CapEx anwendbar. NY Green Bank — $200M+ Storage-Commitment, Target Series A. NY Clean Transportation Prize — ABGESCHLOSSEN 2022. NYC Clean Trucks + EV Make-Ready MHD — eVan Rebate + 90% Netzanschluss."},{"id":"f02","col":"park","t":"NY Clean Transportation Prize — EINGESTELLT","c":"fun","p":"lo","d":"","n":"ABGESCHLOSSEN. $85M an 10 Gewinner, November 2022. Kein neuer Round. cleanneighborhoodschallenge.org tot — Domain hijacked. Nachfolger Clean Mobility Program (PON 5739) nur fuer Kommunen/NGOs. Kein Fit fuer CartZero Startup."},{"id":"f03","col":"todo","t":"NYSERDA Retail Storage Incentive — Contractor Registration","c":"fun","p":"mi","d":"","n":"Fixed-Rate $/kWh pro Commissary Hub. Stationaere Batteriespeicher bis 5 MW hinter Gewerbezaehler. ToU via AMPECO = Eligibility. Erst relevant wenn Commissary-Partnership steht. nyserda.ny.gov Portal."},{"id":"f04","col":"wait","t":"Dr. David Kearney — Kontakt via TSK Flagsol","c":"out","p":"hi","d":"","n":"CSP-Experte, NREL-Kollaboration. Kuraymat (Aegypten, 90 MWel) — gemeinsame Feldarbeit. Firma: Kearney & Associates. Anfrage an TSK Flagsol raus 2026-05-01. Ziel: Warm Intro NREL-Netzwerk + Letter of Support."},{"id":"f05","col":"done","t":"NYSERDA Adam Ruder — Kontakt hergestellt","c":"fun","p":"mi","d":"2026-05-04","n":"Mail raus 2026-05-01 22:46. Antwort 2026-05-04 22:17 (3 Tage, persoenlich). Kein neuer Prize-Round geplant. ABER: R&D Solicitations regelmaessig, naechste erwartet H2 2026 — CartZero potenziell eligible. Newsletter abonniert: nyserda.ny.gov/All-Programs/Clean-Transportation-Program/Connect-with-Us. Kontakt: adam.ruder@nyserda.ny.gov — warm, offen fuer Folgekontakt bei neuer Solicitation."},{"id":"h01","col":"done","t":"Pack-Architektur — S+M Form Factor, Overnight-Swap","c":"pro","p":"hi","d":"2026-05-02","n":"Zwei Form Factors: S-Pack 2,5 kWh ~22 kg / M-Pack 5,0 kWh ~45 kg. Vier Tiers via Kombinatorik: Bronze=S, Silver=M, Gold=M+S, Platinum=M+M. Ein einheitlicher Schienensatz für beide Packs (gleiche Höhe+Breite, Tiefe variiert). Feder-Connector an Rückwand gleicht Tiefenunterschied S vs M aus. Zwei unabhängige Rückwand-Stecker → gemeinsamer DC Bus → PSW Inverter → 120V AC. Overnight-Swap = Cart abends leer am Commissary, beide Packs raus zum Laden, morgens rein. Kein Hot-Swap nötig, kein sequenzieller Swap-Zwang. 120V AC Honda-Output ersetzt durch 51,2V DC Pack + Inverter (Gen 1) → DC-native Loads direkt ab Gen 2 (Inverter entfällt). Packgewicht spannungsunabhängig — 16 Zellen für 5 kWh bei jeder Nennspannung. 48V optimal: minimaler Kabelquerschnitt, maximale Inverter-Effizienz, SELV-konform (<60V). Investor-Narrativ: Bosch-Akku-Prinzip. Zwei SKUs. Vier Tiers. Ein Mechanismus."},{"id":"ins01","col":"done","t":"Insurance Stack & Haftungswaiver — OpEx-Grundlage dokumentiert","c":"ops","p":"hi","d":"2026-05-03","n":"NYC-spezifische Vollerhebung für Investor Due Diligence. LFP-Vorteil: günstigste Prämienkategorie (kein Thermal Runaway wie NMC). AMPECO-BMS-Daten = automatisches Underwriting-Paket. 10 Policen-Typen recherchiert: (1) Commercial General Liability .800–3.000/yr, (2) Product Liability Battery-spezifisch .000–5.000/yr, (3) Inland Marine / Equipment Floater (mobile Packs) .000–4.000/yr, (4) BOP Basispaket GL+Property+BI .500–3.000/yr, (5) Workers Comp NY Pflicht ab MA#1 .500–3.000/yr, (6) Commercial Auto 1 Van optional Y1 .500–5.000/yr, (7) Cyber Liability AMPECO+Vendor-Daten .000–2.500/yr, (8) D&O post-YC-Funding Pflicht .500–6.000/yr, (9) Environmental Endorsement LFP-Entsorgung 00–2.000/yr, (10) Umbrella $1M 50–1.500/yr. GESAMT Y1: Minimal (kein Van, ohne D&O) ~$10k–14k / Standard (1 Van, D&O inkl.) ~$18k–25k / Konservativ ~$22k–28k. 3 Waiver-Modelle: (A) Commissary Agreement Addendum — stärkster Schutz, Rider in bestehenden DOHMH-Vertrag, kein Vendor-Friction, AMPECO-dokumentiert. (B) Digital Swap Service Agreement — Onboarding App/Tablet, Indemnification + UL 9540A Acknowledgement. (C) Equipment Damage Waiver-Option — $5–10/Mo Add-on Bronze-Tier, schützt Vendor + erzeugt Zusatzrevenue + Underwriting-Datenpool. Next steps: Broker-Quotes BlueStone Advisors (Li-Ion-Fokus) oder Vouch (YC-Standard). Commissary Rider juristisch via Matthew Shapiro (Street Vendor Project). AMPECO-Datendokumentation als Underwriting-Paket vorbereiten."},{"id":"ops02","col":"todo","t":"Commissary Hub — Outreach & Raumnutzungs-Validierung","c":"ops","p":"hi","d":"Post-YC","n":"Ziel: Partnerschaft mit 1–3 Pilot-Commissaries für Ladeecke + Swap-Handling. 69 Commissaries in CartZero_Commissary_Hubs.xlsx — Pilot-Auswahl nach Nähe zu Top-Vendor-Clustern (Queens 11368, Bronx Concord Ave). Zu klären pro Commissary: (1) RAUMNUTZUNG — ~3–4 m² Wandfläche + Boden für Ladegestell. 30A/240V-Anschluss vorhanden oder nachrüstbar? Kosten-Annahme: 00/Mo pauschal inkl. Strom (Flat-Rate). (2) HANDLING-BEREITSCHAFT — Staff gibt morgens Packs aus (5 Min/Cart), nimmt abends entgegen + steckt ans Ladegerät. Aufwandspauschale: 5/Cart/Mo (Annahme). Commissary hat Zusatzeinnahme, kein Personalaufwand-Problem weil Vorgang minimal und in DOHMH-Check-in integriert. (3) FDNY CHAPTER 6 COMPLIANCE — LFP-Packs laden über Nacht = morgens ALLE voll = volle installed capacity. FDNY rechnet mit Max, nicht Durchschnitt. Schwellenwert: 20 kWh pro Brandabschnitt. Hub mit 10 Packs (6×M + 4×S) = 6×5kWh + 4×2.5kWh = 40 kWh → ÜBER Schwellenwert. Prüfen: separater Lagerraum / Brandabschnitt möglich? Bei Skalierung (20–50 Packs): mehrere Brandabschnitte oder mehrere Commissary-Standorte zwingend. (4) VERTRAGSFORM — Addendum zum bestehenden DOHMH-Commissary-Vertrag oder separater B2B-Service-Vertrag CartZero ↔ Commissary. Matthew Shapiro (SVP Legal) als Reviewer nach Carina-Intro. FALLBACK wenn Commissary nein sagt → ops03 (Trailer). Erste Kontakte: persönlich nach YC-Ergebnis. Pitch: Zusatzeinnahme + Differenzierungsmerkmal gegenüber anderen Commissaries + kostenlose AMPECO-Nutzungsberichte als Mehrwert."},{"id":"ops03","col":"park","t":"Trailer-Fallback — Mobile Charging Unit","c":"ops","p":"mi","d":"Falls Commissary-Deals scheitern","n":"Fallback wenn Commissaries wider Erwarten keinen Platz vermieten wollen. Cargo-Trailer 14' (z.B. Wells Cargo): Kauf .000–8.000 / Leasing 50–550/Mo. Vorteile: volle Kontrolle über Infrastruktur, eigener Brandabschnitt lösbar, kein Vermieter. Nachteile: (1) Stellplatz am Commissary-Gelände muss separat genehmigt werden — nicht selbstverständlich. (2) FDNY: Trailer mit Batterie-Ladestation = Mobile BESS → eigene Auflagen, evtl. Permit. (3) Swap-Prozess schlechter: Vendor muss extra zum Trailer statt nahtloser Integration in DOHMH-Check-in. (4) Verwässert den Commissary-Moat-Pitch. Erst aktivieren wenn ≥3 Commissary-Gespräche gescheitert. Kostenindikation: 50–550/Mo Trailer-Leasing + Abstellplatz NYC ca. 00–400/Mo = 50–950/Mo vs. 00/Mo Ladeecke. Nur als Brücke bis Commissary-Deal steht."},{"id":"fnd01","col":"todo","t":"Founder Personal Protection — Versicherung, Visa, Steuer (USA)","c":"ops","p":"hi","d":"2026-05-03","n":"Bodo ist deutscher Freiberufler, familienversichert bei Ehefrau (GKV), reist mit ESTA in die USA. Aktuell NICHT in USA. Drei Zeithorizonte: (1) SOFORT vor nächster NYC-Reise: Auslandsreisekrankenversicherung abschließen — GKV zahlt in USA praktisch nichts. HanseMerkur / ADAC Reiseschutz / ERGO, ~/Tag, online in 5 Min. Unfallversicherung mit USA-Deckung ~00/Jahr (Batterien schleppen, Commissary-Betrieb, Feldoperationen). Kreditkarte mit Reiseversicherungspaket prüfen (Amex Platinum o.ä.). (2) NACH YC-ERGEBNIS (Juni 2026): Visa-Strategie klären — ESTA Kipppunkt ist operativer Betrieb (Swaps durchführen). Optionen: E-2 Treaty Investor Visa (D-USA Handelsvertrag, basiert auf Investment in US-Business) oder O-1A Visa (außerordentliche Fähigkeiten — Solarpreis 2019, Climate Reality Leader, Al Gore, 25.000 CP AMPECO = realistischer Kandidat). YC hat Anwaltsnetzwerk für internationale Founder. Steuerberater D/USA finden: DBA D-USA schützt vor Doppelbesteuerung. Kein US-Gehalt von LLC beziehen bis DBA-Situation geklärt. CartZero Delaware-LLC: Pass-through taxation → Gewinne in D versteuern. (3) NACH FUNDING: D&O über CartZero-LLC (bereits in Insurance-Stack ins01). Persönliche Haftpflicht USA-Deckung (deutsche Privathaftpflicht gilt NICHT in USA). Sonstiges: International Driving Permit für Mietwagen. US-SIM/eSIM (Google Voice) für Vendor-Kontakte. Notfallkontakte dokumentieren: Krankenhaus, YC-Anwalt, Deutsche Botschaft Washington D.C."},{"id":"d_nest_pass","col":"done","t":"Nest Climate Campus — Complimentary Pass registriert","c":"cli","p":"hi","d":"2026-05-04","n":"Registriert als: CartZero, Founder & CEO, C-Suite, Industry: Technology. Complimentary General Pass. 3 Tage Javits Center North, 22.–24. Sept 2026. Gefunden über NYC Climate Week Site → Ceres als Co-Host → Nest Campus. hello@thenestcampus.com für Speaker-Follow-up."},{"id":"t_nest_speaker_brief","col":"wait","t":"Nest Climate Campus — Speaker Brief nachschicken","c":"cli","p":"hi","d":"2026-05-11","n":"Form submitted über Nest Campus Website. Kurzversion: 'The Invisible Last Mile — Decarbonizing What Nobody Sees.' Bio ohne Zahlen. Peter Gilmer (CEO, ex-Web Summit) als Entscheider identifiziert. Connect Invite an Gilmer geplant. Jonathan Weiner (Owner) connected + Message raus."},{"id":"d_pl_60mo","col":"done","t":"60-Monats P&L + Valuation Dashboard — gebaut","c":"pro","p":"hi","d":"2026-05-04","n":"Korrigiertes Modell: NYC 55→200→600→1400→2800 Carts, 5 Cities additiv ab M37 (6-Mo-Takt), $1.389 CapEx/Cart (blended LiFePO4), Founder NYC $3K ab M1 / $6K ab M7, 1 FTE $4K ab M13, City Ops Manager +$6K/Mo je Stadt. Break-even M27 bestätigt. ARR Y5: $7.3M (NYC) + Cities = ~$8.4M total. Valuation Base 15x ARR: ~$110M Y5. Σ Kapital $7.9M (YC $500K + Seed $400K + Series A $2M + Series B $5M). HaaS kein Unicorn — aber 13x Return-Multiple für frühe Investoren."},{"id":"d_heather","col":"done","t":"Heather Wokusch — Email gesendet","c":"out","p":"hi","d":"2026-05-04","n":"Climate Reality Leader Kollegin, Rom 2024. US-Bürgerin, Wien-basiert, NYC-vernetzt. TEDx-Speakerin, UN-Kontakte. Executive Director SDG2030.me (SDG 13 Hub = direkter CartZero-Fit) + MESPERO + IFOUND. Mail von bodo@be-eclectic.com. Subject: CartZero + SDG 13 — Rome 2024 follow-up. Bitte: Warm Intro NYC-Netzwerk (UN/NGO/City/Investor). Angebot: CartZero als SDG 13 Hub Projekt featuren. 2025 kein Spot möglich — diesmal Nest Campus bereits registriert + Speaker Proposal eingereicht."},{"id":"d_laminat_v6","col":"done","t":"Das Laminat - CartZero_Laminat_v6_FINAL.docx","c":"yc","p":"hi","d":"2026-05-04","n":"324 Paragraphen. Pack-Architektur modular (5 kWh Ref-Pack, 2-10 kWh elektrisch, Propan-Klarstellung), Pack-Visual Gen1-3 eingebettet, Pilot-Beschreibung (Bronx Zoo MFV Depot + Mott Haven), Outreach-Block (Carina, NYSERDA, Ceres, Dr. Kearney, 2-stage NYC), FOIL #21701, Foerdermittel-Matrix, Impact Stack, Progress-Since-Application-Sektion (YC Update April 29 verbatim), UPDATE May 2nd (Energy-Modell-Korrektur). Co-Founder: one concrete candidate."},{"id":"d_briefing_bjorn","col":"done","t":"Co-Founder Briefing - Bjorn Dethlefsen (Candidate A)","c":"ppl","p":"hi","d":"2026-05-04","n":"DOCX, englisch. 9 Sektionen, 237 Paragraphen. Dyness-Kontext explizit: baut ab 1.5. Lieferantenseite auf - CartZero braucht genau das. Framing: andere Seite der Bruecke. Gen1-3 Procurement-Hebel in Roadmap-Tabelle. Equity offen, kein Term Sheet. Closing: Read this. Push back. Then lets talk. EY-Fehler im Dokument wird muendlich korrigiert (ist Deloitte)."},{"id":"d_briefing_john","col":"done","t":"Co-Founder Briefing - John Shimshack","c":"ppl","p":"hi","d":"2026-05-04","n":"DOCX, englisch. 9 Sektionen, 201 Paragraphen. Founder-to-Founder-Ton. Oeffnet mit Al-Gore-Zitat Rome 2024. Drei Hebel: B2G Sales Complex Cycles, Turkish Vendor Community NYC, Narrative Architecture. Bridge-Investor-Angle (12 Wochen YC-Gap) eigene Sektion. Two Fronts One War Tabelle: Frankfurt EV Fleet vs CartZero NYC. Closing: sein eigener CRL-Bio-Satz zurueckgespiegelt."},{"id":"d_mail_bjorn","col":"done","t":"Bjorn Dethlefsen - Mail gesendet","c":"out","p":"hi","d":"2026-05-04","n":"Persoenlich, direkt. Zwei Punkte: (1) freelancing/offene Posten, (2) CartZero vorstellen - Meinung, Feedback, Sparring. Ziel: Co-Founder gewinnen. Briefing-DOCX liegt bereit zum Nachschicken nach erster Reaktion."},{"id":"d_hodge_assessment","col":"done","t":"Hodge Hodgson - Profil-Assessment abgeschlossen","c":"ppl","p":"mi","d":"2026-05-04","n":"Kein Co-Founder. NYC Field Partner / Commissary Door Opener. epilot-Kollege. Sunrun 3,5 Jahre NJ/East Coast D2D Solar. NJ-politisches Netzwerk. Halb US-Buerger. Clean Energy DNA echt. Aktivieren post-YC-Funding als NYC Field Sales Advisor. Erfolgsbasiert oder kleine Equity."},{"id":"w_bjorn_response","col":"wait","t":"Bjorn Dethlefsen -  Climate Campus. Früher: Web Summit (erster FTE, Executive Director, Chief Impact Officer, 70.000+ Teilnehmer). Gründer planet:tech (Web Summit Ableger). UFI Global Sustainable Development Award. War auf Bodos LinkedIn-Profil — wahrscheinlich nach Speaker-Mail. Connect Invite geplant. Speaker Proposal erneut an opportunities@thenestcampus.com (nicht hello@). Jonathan Weiner (Owner) bereits connected + Message raus. Peter ist der Entscheider für Speaker-Slots."},{"id":"c_orlin_radev","col":"wait","t":"Orlin RadEV (AMPECO CEO) — Response pending","c":"out","p":"hi","d":"","n":"Founder & CEO AMPECO. CartZero baut auf seinem Stack auf. Message gesendet: 'I've built something on top of AMPECO — urban, high-frequency, subscription model on top of your stack. Currently going through YC. NYC as launch market. BMW i Ventures in your cap table — would love 20 min with someone there, happy to go through you.' Context: Chargemaker/CPMS-Evaluierung als Anknüpfung. icnc26 als persönlicher Touch. ACHTUNG: Orlin ist gerissen, Delaware C-Corp. Nichts zum Produkt verraten bis Vertrauen etabliert. Ziel: Warm Intro zu Baris Guzel (BMW i Ventures), kein Co-Founder."},{"id":"c_baris_guzel","col":"park","t":"Baris Guzel (BMW i Ventures) — Warm Intro via Orlin","c":"out","p":"hi","d":"","n":"Partner @ BMW i Ventures. Hat AMPECO funded — kennt den Stack bereits. Postet aktiv über PE/SaaS-Verwerfungen (Medallia Post). Bodo hat Baris' Medallia-Post geliked. Orlin ist der Pfad. Kontext für Pitch: Software = worst LSTA sub-sector, Independent Power & Renewable Energy = top performer Q1 2025. CartZero = infrastructure + clean energy + recurring subscription. Gegenteil von allem was gerade bricht. WARTEN bis Orlin antwortet."},{"id":"d_dpma","col":"done","t":"DPMA Wortmarke „CartZero“ — angemeldet","c":"ops","p":"hi","d":"2026-05-10","n":"Aktenzeichen 302026225834.4. Klassen 9 (Batteriespeichersysteme), 37 (Installation/Wartung), 39 (Transport/Energieverteilung). Anmelder: Bodo Becker als natürli able resource.’ Timing: nach JP-Morgan-Post, vor YC-Ergebnis oder kurz danach. Nicht beides gleichzeitig publishen."},{"id":"t_eclectic_redesign","col":"done","t":"be-eclectic.com Redesign — finalisieren","c":"pro","p":"mi","d":"2026-05-08","n":"Live auf GitHub Pages. Syne/Lora/Mulish Fonts. Eclectic als Nomen (Lexikon-Style Hero). Robert Swan Quote. Projects Grid: CartZero, BaaS, Ninja. Credentials 4-Item. Planet Earth Location. Screenshot 2026-05-08 gespeichert. CartZero und Eclectic vollständig entkoppelt."},{"id":"d_laminat_v7","col":"done","t":"Das Laminat v7 — alle Deltas integriert","c":"yc","p":"hi","d":"2026-05-13","n":"Intelligence Layer / Learning Model ('battery is wedge, data is moat'). Break-even M14. Tiers $129/$179/$249/$359. Vier Risiken-Zeilen updated. PopWheels Mitigation: 'They can buy batteries. They cannot buy 12 months of SoC patterns and DOHMH compliance logs.' Battery Platform Argument. DPMA Aktenzeichen. Drei-Phasen-Modell (NYC → Top 10 US Cities → Philanthrop Open Source Cairo). Kein Global TAM $5B+."},{"id":"d_pnl_v10_2","col":"done","t":"P&L v10-2 — Break-even M14, DOE Sensitivity","c":"pro","p":"hi","d":"2026-05-12","n":"Break-even M14 (~40 Carts, ~$92K ARR). Mo 36: 210 Carts, ~$481K ARR. Sensitivity DOE: Lever 1 Tier Mix ($165→$215 blended), Lever 2 Cart Ramp (210→1.400 Carts), Lever 3 Commissary Penetration (50→95%). Combined: Worst $415K / Base $2.2M / Best $3.6M ARR Mo 36. Rodrigo Part 6 Fußnote: auch Worst Case J-Curve recovert. Profitabel bevor Seed."},{"id":"d_pwa_cartzero","col":"done","t":"CartZero PWA — live auf cartzero.energy","c":"pro","p":"hi","d":"2026-05-16","n":"6 Pages: index (Hero), join (Vendor Onboarding), dashboard (Operator/Investor), map (Electrified Blocks), mycart (Vendor QR), discover (Passanten-QR). manifest.json + sw.js + icons (192+512px). Solo Founder, kein Developer, ein Nachmittag. 'Open cartzero.energy on your phone. Add to homescreen. That is the app.' YC-Interview Proof of Execution."},{"id":"d_qr_codes","col":"done","t":"QR Codes — /mycart und /discover generiert","c":"pro","p":"lo","d":"2026-05-17","n":"cartzero.energy/mycart: für Vendor-Schnellzugang am Cart. cartzero.energy/discover: für Passanten am Cart. Beide druckfertig (dunkler Hintergrund #070e1a). Python/Pillow, ERROR_CORRECT_H."},{"id":"d_cal_gruengebaut","col":"done","t":"Cal.com live auf gruengebaut.de","c":"ops","p":"lo","d":"2026-05-14","n":"cal.eu/gruengebaut/erstgesprach (ohne Umlaut-ae). Direktes CalDAV mit IONOS-Kalender. 'Erstgespräch buchen' Button in gruengebaut.de index.html. IONOS-Hosting, GitHub Repo. Kostenfrei, kein Lock-in."},{"id":"d_svp_ejvv_intel","col":"done","t":"SVP EJVV Reports 2022 — vollständig gescreent","c":"res","p":"hi","d":"2026-05-17","n":"Technical Memo + Project Overview. Key: SVP empfiehlt 2022 explizit Commissary-Charging als Lösung ('installing charging infrastructure inside commissaries could conveniently solve...'). CartZero-Thesis drittvalidiert. Honda EU2000i emits 42x mehr CO als Norm. 91% = Grid-Präferenz (nicht Battery-Interest — Stat korrigieren!). Commissary-Owner Names: Islam Adel, Sammy Noor, Sherif Amish, Mohamed El-Khatib — gegen 69-Commissary-DB abgleichen. Design Lab Kontakte: Ari Kahn (Con Edison), Sonal Jessel (WE ACT EJ), Marco Conner Diaquoi (Transportation Alternatives). FreeWire MobiGen als 'schwer overnight zu lagern' bewertet — CartZero löst das."},{"id":"d_popwheels_analysis","col":"done","t":"PopWheels Competitive Analysis — abgeschlossen","c":"res","p":"hi","d":"2026-05-17","n":"E-Bike-Batterien + Adapter für Food Carts. Erster Full-Day-Test La Chona Mexicana Jan 2026. Sponsoring SVP Scavenger Quest = so haben sie die SVP-Beziehung aufgebaut (Sponsoring Playbook). 50+ Stationen, 200k+ Swaps (e-bikes). Station-based, kein Commissary-Modell. Hammer: 'vielleicht vielleicht nicht die perfekte Lösung.' SVP-Beziehung via Andrew Gustafson (Turnstile Tours, Sponsor) aufgebaut. CO2/NOx komplett absent aus ihrer Kommunikation. Key: CartZero Commissary-Mechanismus = IP das nicht öffentlich kommuniziert wird."},{"id":"d_freewire_blankstreet","col":"done","t":"FreeWire + Blank Street — Research abgeschlossen","c":"res","p":"mi","d":"2026-05-17","n":"FreeWire: $260M raised, Juni 2024 geschlossen, IP an OptiGrid. MobiGen war 80 kWh Shared-Event-Unit, kein Einzelcart-Produkt. Investor-Frage 'warum schaffst du es wenn FreeWire mit $260M gestorben ist' → Antwort: FreeWire ersetzte Grid-Infrastruktur. CartZero nutzt vorhandene Commissary-Infrastruktur. Asset-light beats hardware-first. Blank Street Coffee: $500M Valuation, startete 2020 als battery-powered Coffee Cart in Brooklyn, verließ Battery-Modell sofort für Static Cafes. Coffee-Cart Power-Draw (minimal) ≠ Halal Cart (3.000W+). Kein echter Präzedenzfall für CartZero."},{"id":"d_yc_w26_batch","col":"done","t":"YC W26 Batch Analyse — CartZero Positionierung","c":"yc","p":"mi","d":"2026-05-14","n":"Ergebnis: Condor/Squid/Inviscid/Terranox = kein echtes Climate Hardware. Voxel Energy (energieautarke RZ mit solar+Batterien) = nächster Analog — YC hat das funded. Frame bestätigt: 'Battery is the wedge. Data is the moat.' Hardware-first pitchen, dann sofort Intelligence Layer. CartZero ist physical-world wedge mit AI advantage."},{"id":"d_honda_earnings","col":"done","t":"Honda Earnings — Generator-Decline dokumentiert","c":"res","p":"mi","d":"2026-05-14","n":"Honda vor erstem operativen Verlust seit Börsengang 1957. Power Products Segment (Generatoren) Q3 2026: operative Verluste 6,5 Mrd Yen. Der EU2200i — exakt das Gerät auf jedem zweiten NYC Food Cart — kommt von einem Hersteller der selbst die Kurve nicht kriegt. Pitch-Baustein: 'CartZero ersetzt nicht ein Nischenprodukt. Wir ersetzen ein Produkt dessen Hersteller selbst die Kurve nicht kriegt.' LinkedIn Post drafted — warten auf CartZero LI Page aktiv."},{"id":"d_cartzero_li_about","col":"done","t":"CartZero LinkedIn About-Text — finalisiert","c":"out","p":"mi","d":"2026-05-14","n":"1.487 Zeichen. 'Every day, 23,000 food cart vendors...' → 'CartZero ends this.' LFP Battery Swap. Commissary. No route change. No capital cost. No new behavior. Founder: Climate Reality Leader, 15 Jahre, Solar Prize 2019. 'NYC is where we start. The city that never sleeps runs on gasoline. Not for much longer.' cartzero.energy → be-eclectic.com Redirect. Investor Access optional."},{"id":"d_cartzero_li_page","col":"done","t":"CartZero LinkedIn Company Page — aufgebaut","c":"out","p":"mi","d":"2026-05-16","n":"Handle: cartzero-energy. Banner 4200×700px: Manhattan Aerial Blue Hour, CART weiß / ZERO. orange, Tagline rechts. Logo 400×400px via Python/Pillow. About-Text finalisiert. Tagline: 'We give New York City its air back.'"},{"id":"d_schlep_blindness","col":"done","t":"Schlep Blindness — auf CartZero angewendet","c":"yc","p":"mi","d":"2026-05-14","n":"Paul Graham 2012: Founder vermeiden schlep-schwere Ideen unbewusst. CartZero = Lehrbuchfall. 23.000 Vendors (kein Englisch, kein Bankkonto), 69 Commissary-Betreiber, DOHMH-Regulierung, Immigrant-Vertrauen. 24-jähriger Berkeley-Dropout schaut weg. Bodo denkt: ich hab das dreimal gemacht. 'The moat is the schlep.' YC Why-now + Why-you in einem Satz: CartZero exists because every founder who saw the problem looked away. I didn't."},{"id":"w_rachel_aimee","col":"wait","t":"Rachel Aimee (Urban Justice Center) — Email gesendet","c":"out","p":"hi","d":"2026-05-17","n":"Director of Development, Urban Justice Center / SVP. Email: Subject 'Cart Electrification and the CO2 narrative NYC street food hasn't told yet.' CO2/NOx als Policy Lever. CartZero als 'different distribution model where carts don't need to leave their route to charge.' Kein Commissary-Mechanismus verraten. YC applicant + Climate Reality Leader + Al Gore. Sunny regards from Germany. Adresse: raimee@urbanjustice.org (wahrscheinlich — verifizieren). Ziel: 15-min Call, natürliche Brücke zu Shapiro und ggf. Carina."},{"id":"t_instagram_squatter","col":"todo","t":"Instagram @cart.zero — Trademark Report einreichen","c":"ops","p":"hi","d":"","n":"Indischer Amazon-Affiliate-Account @cart.zero (mit Punkt) seit Feb 2026. DPMA Aktenzeichen 302026225834.4 (2026-05-10) als Trademark-Nachweis. Instagram IP-Beschwerde-Formular. Parallel: @cartzero (ohne Punkt) prüfen — falls frei, sofort sichern. Google-Suchresultat dokumentiert (CartZero.energy wird von @cart.zero überlagert). Vor Climate Week NYC bereinigen."},{"id":"t_commissary_owners_svp","col":"todo","t":"SVP-Commissary-Owner Namen — gegen 69-DB abgleichen","c":"res","p":"hi","d":"","n":"SVP EJVV Report 2022 nennt vier Commissary-Owner die bereits mit SVP zu Vendor-Elektrifizierung zusammengearbeitet haben: Islam Adel, Sammy Noor, Sherif Amish (Technical Memo Acknowledgements) + Mohamed El-Khatib (Design Lab Participant). CartZero hat 69 Commissaries in CartZero_Commissary_Hubs.xlsx. Abgleich: Sind diese vier dabei? Falls ja: warme Tür, kein Cold Outreach."},{"id":"t_kompas_vc","col":"todo","t":"Kompas VC — Outreach planen","c":"out","p":"mi","d":"Nach YC-Entscheidung","n":"€150M Fund II. Frühphase, 10-15 Jahre Horizont. Fokus: Industrie + Nachhaltigkeit. Büros Amsterdam/Berlin/Copenhagen/Tel Aviv. Investiert Europa, Israel UND USA (Helios-Portfolio: US-Startup CO2-freie Eisenherstellung aus Erz). LinkedIn-Kommentar unter Kompas-Post gepostet 2026-05-14 als Warm-up (leise, kein CartZero-Pitch). Nächster Schritt: Richtigen GP identifizieren, dann nach YC-Ergebnis ansprechen."},{"id":"t_honda_li_post","col":"todo","t":"LinkedIn Post Honda Earnings — publishen","c":"out","p":"mi","d":"Nach CartZero LI Page aktiv","n":"Text fertig: Honda vor erstem operativen Verlust seit 1957. Power Products (Generatoren) verliert. EU2200i = exakt das Gerät auf NYCs Food Carts. Pitch-Schluss: 'Das Fenster ist offen — jetzt.' Postautor: Bodo Becker (personal) ODER CartZero Company Page. Nicht beides. Timing: nach Carter LI Page live und verifiziert."},{"id":"t_cartzero_app_domain","col":"todo","t":"cartzero.app — registrieren Juli 2026","c":"ops","p":"mi","d":"ca. 2026-07-20","n":"Domain expired ~21.05.2026. Grace Period ~30 Tage, Redemption Period ~30 Tage danach. Frühestens ca. 20. Juli 2026 direkt registrierbar via Porkbun. Kalender-Reminder gesetzt. Kein teures Backorder-Service nötig — keine aktive Nutzung der alten Domain. PWA läuft auf cartzero.energy, /mycart und /discover bereits mit QR-Codes live."},{"id":"t_vendy_awards","col":"todo","t":"Vendy Awards 2026 — Sponsoring prüfen","c":"cli","p":"mi","d":"SVP Herbst 2026","n":"SVP Jahres-Fundraiser + sichtbarste Veranstaltung NYC Street Vendor Universum. PopWheels hat SVP-Beziehung via Event-Sponsoring aufgebaut (Scavenger Quest, gemeinsam mit Turnstile Tours). Vendy Awards = nächster natürlicher Sponsoring-Slot, noch nicht von PopWheels besetzt. Budget: kleines Commitment, Turnstile Tours Referenz zeigt Maßstab. Timing: Herbst 2026 = parallel Climate Week NYC. Aktivieren nach YC-Entscheidung."}];

const CC = {yc:'#378ADD',out:'#1D9E75',pro:'#7F77DD',ops:'#8899b4',res:'#EF9F27',cli:'#D85A30',fun:'#639922',ppl:'#D4537E',leg:'#E24B4A',hub:'#1D9E75',str:'#7F77DD'};
const CL = {yc:'YC',out:'outreach',pro:'product',ops:'ops',res:'research',cli:'climate',fun:'funding',ppl:'people',leg:'legal',hub:'hub',str:'strategy'};

let currentView = 'focus';

function pill(c){
  const col = CC[c]||'#8899b4';
  const lbl = CL[c]||c;
  return `<span class="pill" style="background:${col}22;color:${col}">${lbl}</span>`;
}

function card(t, accentClass=''){
  const note = t.n ? `<div class="card-note">${t.n.replace(/
/g,'<br>')}</div>` : '';
  const chevron = t.n ? `<span class="card-chevron">&#8964;</span>` : '';
  const dateStr = t.d ? `<span class="card-date">${t.d}</span>` : '';
  return `<div class="card ${accentClass}" onclick="toggleCard(this)">
    <div class="card-title">${t.t}</div>
    <div class="card-row">${pill(t.c)}${dateStr}${chevron}</div>
    ${note}
  </div>`;
}

function toggleCard(el){
  el.classList.toggle('open');
}

function daysFrom(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr);
  const now = new Date('2026-05-17');
  const diff = Math.round((d - now) / 86400000);
  return diff;
}

function renderFocus(filter=''){
  const hi_todos = DATA.filter(t => t.col==='todo' && t.p==='hi' && matches(t,filter));
  const waits = DATA.filter(t => t.col==='wait' && matches(t,filter));

  let html = '';
  if(hi_todos.length){
    html += `<div class="sec"><span class="sec-dot" style="background:#E24B4A"></span>Jetzt handeln (${hi_todos.length})</div>`;
    hi_todos.forEach(t => html += card(t,'urgent'));
  }
  if(waits.length){
    html += `<div class="sec"><span class="sec-dot" style="background:#EF9F27"></span>Watching (${waits.length})</div>`;
    waits.forEach(t => html += card(t,'hi'));
  }
  if(!html) html = '<div class="empty">Nichts zu zeigen</div>';
  document.getElementById('view-focus').innerHTML = html;
}

function renderTimeline(){
  const today = new Date('2026-05-17');
  let html = '<div class="tl">';
  DL.forEach(dl => {
    const days = daysFrom(dl.d);
    const dStr = days < 0 ? 'vergangen' : days === 0 ? 'heute' : `in ${days} Tagen`;
    const dotCls = dl.u ? 'u' : (days < 30 ? 'soon' : '');
    const dateLabel = dl.d.split('-').slice(1).reverse().join('.') + '.' + dl.d.split('-')[0];
    html += `<div class="tl-item">
      <div class="tl-left"><div class="tl-dot ${dotCls}"></div><div class="tl-date-str">${dateLabel}</div></div>
      <div><div class="tl-label">${dl.label}</div><div class="tl-days">${dStr}</div></div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('view-timeline').innerHTML = html;
}

function group(title, items, collapsed=false, accentClass=''){
  if(!items.length) return '';
  const id = 'grp-' + Math.random().toString(36).slice(2);
  const body = items.map(t => card(t, accentClass)).join('');
  const display = collapsed ? 'none' : 'block';
  return `<div class="group">
    <div class="group-hdr" onclick="toggleGroup('${id}')">
      <div class="group-hdr-left">
        <span class="group-title">${title}</span>
        <span class="group-count">${items.length}</span>
      </div>
      <span style="color:var(--text3);font-size:12px">&#8964;</span>
    </div>
    <div id="${id}" class="group-body" style="display:${display}">${body}</div>
  </div>`;
}

function toggleGroup(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function renderAll(filter=''){
  const todo_hi = DATA.filter(t => t.col==='todo' && t.p==='hi' && matches(t,filter));
  const todo_mi = DATA.filter(t => t.col==='todo' && t.p!=='hi' && matches(t,filter));
  const waits   = DATA.filter(t => t.col==='wait' && matches(t,filter));
  const done    = DATA.filter(t => t.col==='done' && matches(t,filter));
  const park    = DATA.filter(t => t.col==='park' && matches(t,filter));

  let html = '';
  html += group('To do — high priority', todo_hi, false, 'urgent');
  html += group('Watching', waits, false, 'hi');
  html += group('To do — weitere', todo_mi, true);
  html += group('Done', done, true);
  html += group('Parked', park, true);
  if(!html) html = '<div class="empty">Keine Treffer</div>';
  document.getElementById('view-all').innerHTML = html;
}

function matches(t, q){
  if(!q) return true;
  const s = (t.t + ' ' + (t.n||'') + ' ' + t.c).toLowerCase();
  return q.toLowerCase().split(' ').every(w => s.includes(w));
}

function switchView(v){
  currentView = v;
  document.getElementById('search').value = '';
  ['focus','timeline','all','search'].forEach(n => {
    document.getElementById('view-'+n).style.display = 'none';
  });
  document.getElementById('view-'+v).style.display = 'block';
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('on', ['focus','timeline','all'][i]===v);
  });
  if(v==='timeline') renderTimeline();
  else if(v==='all') renderAll();
  else renderFocus();
}

function onSearch(){
  const q = document.getElementById('search').value.trim();
  if(!q){
    switchView(currentView==='search' ? 'focus' : currentView);
    return;
  }
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  ['focus','timeline','all'].forEach(n => document.getElementById('view-'+n).style.display = 'none');
  const results = DATA.filter(t => matches(t, q));
  let html = '';
  if(results.length){
    results.forEach(t => html += card(t, t.col==='todo' && t.p==='hi' ? 'urgent' : t.col==='wait' ? 'hi' : ''));
  } else {
    html = '<div class="empty">Keine Treffer fuer "'+q+'"</div>';
  }
  document.getElementById('view-search').innerHTML = html;
  document.getElementById('view-search').style.display = 'block';
}
